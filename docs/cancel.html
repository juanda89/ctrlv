<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout Canceled — Control-V</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="assets/control-v-logo.svg" />
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#3B82F6",
              "primary-hover": "#2563EB",
              "background-light": "#F8FAFC",
              "background-dark": "#0A0A1A",
              "surface-light": "#FFFFFF",
              "surface-dark": "#16162C",
              "text-light": "#1E293B",
              "text-dark": "#F1F5F9",
              "muted-light": "#64748B",
              "muted-dark": "#94A3B8",
            },
            fontFamily: {
              display: ["Inter", "sans-serif"],
            },
          },
        },
      };
    </script>
    <style>body { font-family: "Inter", sans-serif; }</style>
  </head>
  <body class="bg-background-light text-text-light transition-colors duration-300 dark:bg-background-dark dark:text-text-dark">
    <main class="flex min-h-screen items-center justify-center px-4">
      <div class="w-full max-w-md rounded-2xl border border-gray-200 bg-white p-10 text-center shadow-xl dark:border-white/10 dark:bg-surface-dark">
        <div class="mx-auto mb-6 flex h-20 w-20 items-center justify-center rounded-full bg-orange-100 dark:bg-orange-900/30">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-orange-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </div>

        <h1 class="mb-3 text-3xl font-bold">Checkout canceled</h1>
        <p class="mb-8 text-muted-light dark:text-muted-dark">
          No charge was made. You can try again anytime from the Control-V menu bar.
        </p>

        <p class="text-sm text-muted-light dark:text-muted-dark">
          Switch back to Control-V and click <strong>Subscribe</strong> when you're ready.
        </p>
      </div>
    </main>
  </body>
</html>
